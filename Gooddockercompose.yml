version: '3.8'

services:
  web:
    image: nginx:1.23.3  # фиксируем версию
    ports:
      - "${WEB_PORT:-8080}:80"  # используем переменные окружения
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS_FILE: /run/secrets/db_root_password  # используем секреты
    secrets:
      - db_root_password
    networks:
      - webnet
    restart: unless-stopped

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password  # используем секреты
      MYSQL_DATABASE: mydb
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_root_password
    networks:
      - dbnet
    restart: unless-stopped

volumes:
  db_data:

secrets:
  db_root_password:
    file: ./secrets/db_root_password  # хранится в отдельном файле с ограниченным доступом

networks:
  webnet:
  dbnet:
